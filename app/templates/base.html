<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title or "FastAPI App" }}</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header class="border-b border-slate-800">
      <div class="mx-auto max-w-5xl px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="h-9 w-9 rounded-xl bg-slate-800 grid place-items-center font-bold">
            A
          </div>
          <div>
            <div class="font-semibold leading-tight">Atabara</div>
            <div class="text-xs text-slate-400">FastAPI + Tailwind pages</div>
          </div>
        </div>

        <nav class="flex items-center gap-2">
          <a
            href="/"
            class="px-3 py-2 rounded-lg text-sm hover:bg-slate-900 border border-transparent hover:border-slate-800"
          >
            Home
          </a>
          <a
            href="/som-mapping"
            class="px-3 py-2 rounded-lg text-sm hover:bg-slate-900 border border-transparent hover:border-slate-800"
          >
            SOM Mapping
          </a>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-5xl px-4 py-10">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-slate-800">
      <div class="mx-auto max-w-5xl px-4 py-6 text-sm text-slate-400">
        © {{ 2026 }} • Built with FastAPI
      </div>
    </footer>
  </body>
</html>
