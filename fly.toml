app = "xariff"
primary_region = "syd"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[mounts]
  source = "data"
  destination = "/data"

[env]
  DATABASE_URL = "sqlite+aiosqlite:////data/xariff.db"

[[vm]]
  memory = "2gb"
  cpus = 1
  memory_mb = 2048
