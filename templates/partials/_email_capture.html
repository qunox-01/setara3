<!-- Email capture form -->
<form hx-post="/api/email-capture"
      hx-target="#email-capture-result"
      hx-swap="innerHTML"
      class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto">
    <input type="hidden" name="source" value="homepage" />
    <input type="email" name="email" required
           placeholder="your@email.com"
           class="flex-1 px-4 py-3 rounded-xl text-slate-900 placeholder-slate-400 border-0 focus:outline-none focus:ring-2 focus:ring-blue-300 text-sm" />
    <button type="submit"
            class="px-6 py-3 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-xl text-sm transition-colors whitespace-nowrap">
        Get updates
    </button>
</form>
